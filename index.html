<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <!-- Carica React (Libreria Core) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- Carica React DOM (Per il rendering nel browser) -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Carica Babel (Per compilare JSX in JavaScript leggibile dai browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;
        function Modal({
            title,
            content,
            show = false,
            onClose = () => { }
        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <button onClick={onClose}>Annulla</button>
                    </div>
                </div>,
                document.body
            )
        }
        const ListaAnimali = () => {
            const [animals, setAnimals] = useState([]);
            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];
            const aggiungi = () => {
                const randomAnimal = animalsChoices[Math.floor(Math.random() * animalsChoices.length)];

                setAnimals(vecchiAnimals => [...vecchiAnimals, randomAnimal]);
            };
            return (
                <main >
                    <button onClick={aggiungi}>Aggiungi animale</button>
                    <details>
                        <summary>Animali</summary>
                        <ul>
                            {animals.map((animal, i) => <li key={i}>{animal}</li>)}
                        </ul>
                    </details>

                </main>
            )
        }
    </script>
    <script type="text/babel">
        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector('.lista-animali')
        const root = createRoot(listaAnimali)
        root.render(<ListaAnimali />)
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- 
Trasforma l’array animals usando useState (l’array è inizialmente vuoto).
Aggiungi un bottone "Aggiungi Animale" sopra il <details>.
Cliccando il bottone, un animale casuale viene aggiunto alla lista.
Usa un array predefinito per scegliere casualmente:
const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];
L’animale selezionato deve essere aggiunto all’interno della lista <ul> come <li>.

Obiettivo: L’utente può vedere gli animali aggiunti dinamicamente nella lista. -->

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
