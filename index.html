<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <!-- Carica React (Libreria Core) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- Carica React DOM (Per il rendering nel browser) -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Carica Babel (Per compilare JSX in JavaScript leggibile dai browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;
        const animals = ['cane', 'gatto', 'tartaruga']
        const ListaAnimali = () => {
            return (
                <main >
                    <details>
                        <h1>Animali</h1>
                        <ul>
                            {animals.map((animal, i) => <li key={i}>{animal}</li>)}
                        </ul>
                    </details>

                </main>
            )
        }
    </script>
    <script type="text/babel">
        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector('.lista-animali')
        const root = createRoot(listaAnimali)
        root.render(<ListaAnimali />)
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- 
Monta un componente React all’interno dell’elemento con classe .lista-animali.

Il componente deve includere:
Un elemento <details> con titolo "Animali", che contiene:
Una lista <ul> statica che viene creata a partire da un array di stringhe (animals) dove ciascuna stringa rappresenta il nome di un animale.

Obiettivo: Mostrare la struttura base della lista di animali con un <details> che può essere espanso o contratto. -->

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
