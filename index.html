<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <!-- Carica React (Libreria Core) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- Carica React DOM (Per il rendering nel browser) -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Carica Babel (Per compilare JSX in JavaScript leggibile dai browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;
        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { },

        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <button onClick={onClose}>Annulla</button>
                        <button onClick={onConfirm}>Conferma</button>
                    </div>
                </div>,
                document.body
            )
        }
        const ListaAnimali = () => {
            const [animals, setAnimals] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [inputValue, setInputValue] = useState("cane");

            // Funzione per gestire la conferma
            const handleConfirm = () => {
                if (inputValue.trim() !== "") {
                    setAnimals([...animals, inputValue]);
                    setInputValue(""); // Reset input
                    setIsModalOpen(false); // Chiudi modale
                }
            };

            return (
                <main>
                    <button onClick={() => setIsModalOpen(true)}>Aggiungi animale casuale</button>

                    <details open>
                        <summary>Animali</summary>
                        <ul>
                            {animals.map((animal, i) => <li key={i}>{animal}</li>)}
                        </ul>
                    </details>

                    {/* Utilizzo della Modale */}
                    <Modal
                        show={isModalOpen}
                        title="Nuovo Animale"
                        onClose={() => setIsModalOpen(false)}
                        onConfirm={handleConfirm}
                        content={
                            <input
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="Inserisci nome animale..."
                            />
                        }
                    />
                </main>
            )
        }
    </script>
    <script type="text/babel">
        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector('.lista-animali')
        const root = createRoot(listaAnimali)
        root.render(<ListaAnimali />)
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- 
Espandilo affinché:

La vecchia prop content può essere usata per passare un componente qualsiasi.
Un nuovo div in fondo alla modale contiene il bottone Annulla e un nuovo bottone Conferma.
Una nuova prop onConfirm si aspetta una funzione per gestire l’azione di conferma.
Sostituisci l’aggiunta casuale dell’animale con una modale interattiva:
Cliccando il bottone "Aggiungi Animale," si apre una modale.
La modale include un input di testo (passato al prop content) per inserire il nome di un animale.
Conferma: Aggiunge l’animale alla lista e chiude la modale.
Annulla: Chiude la modale senza modificare la lista.

Obiettivo: L’utente può aggiungere animali specifici utilizzando la modale.-->

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
